apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-server

spec:
  replicas: 1

  selector:
    matchLabels:
      app: auth-server

  template:
    metadata:
      labels:
        app: auth-server

    spec:
      containers:
        - name: auth-server

          image: springboot-1-auth-server:latest
          imagePullPolicy: Never

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 20

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 9000
            failureThreshold: 30
            periodSeconds: 10

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker

            - name: CONFIG_SERVER_URL
              value: http://config-server:8888

          ports:
            - containerPort: 9000

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"

            limits:
              memory: "1Gi"
              cpu: "1000m"