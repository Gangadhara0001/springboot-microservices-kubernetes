apiVersion: v1
kind: ConfigMap

metadata:
  name: prometheus-config

data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:

      - job_name: employee-service

        metrics_path: /actuator/prometheus

        static_configs:
          - targets:
              - employee-service:8082

      - job_name: department-service

        metrics_path: /actuator/prometheus

        static_configs:
          - targets:
              - department-service:8081

      - job_name: api-gateway

        metrics_path: /actuator/prometheus

        static_configs:
          - targets:
              - api-gateway:8085